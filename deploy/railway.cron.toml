# Railway cron service — weekly review refresh + pulse
# Create a SECOND service in your Railway project pointing at this repo.
# Settings -> Deploy -> Config file path: deploy/railway.cron.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
startCommand = "python -m src.worker"
cronSchedule = "0 6 * * 1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 1

[env]
HOST = "0.0.0.0"
DATA_DIR = "/app/data"
REVIEW_WEEKS = "10"
